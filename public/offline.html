<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>مجمع الحبيِّب</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
        color: #1a2332;
        font-family: "Cairo", system-ui, sans-serif;
      }

      main {
        width: min(92vw, 32rem);
        padding: 2rem;
        border: 1px solid #d8e4fb;
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 20px 45px rgba(52, 83, 167, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        line-height: 1.9;
        color: #526071;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>الاتصال غير متوفر حاليًا</h1>
      <p>يمكنك إعادة المحاولة عند رجوع الإنترنت، وسيعود التطبيق للعمل تلقائيًا.</p>
    </main>
  </body>
  </html>
